version: 1
tag_keys:
  criticality:
    label: 重要度
    values:
      - low
      - medium
      - high
      - critical
  environment:
    label: 環境
    required: true
    values:
      - prod
      - staging
      - dev
  lifecycle:
    label: ライフサイクル
    values:
      - active
      - temporary
      - deprecated
      - retired
  managed-by:
    label: 管理方法
    values:
      - manual
      - ansible
      - terraform
  note:
    label: 補足
    free_value: true
  owner:
    label: オーナー
    required: true
    free_value: true
  risk:
    label: 注意
    free_value: true
  site:
    label: サイト
    free_value: true
  todo:
    label: TODO
    free_value: true
  visibility:
    label: 公開範囲
    values:
      - private
      - internal
      - public
  zone:
    label: ゾーン
    free_value: true
reserved_prefixes:
  - 'cataloga:'
