version: 1
tag_keys:
  criticality:
    label: 重要度
    values:
      - low
      - medium
      - high
      - critical
  environment:
    label: 環境
    required: true
    values:
      - prod
      - staging
      - dev
  lifecycle:
    label: ライフサイクル
    values:
      - active
      - temporary
      - deprecated
      - retired
  managed-by:
    label: 管理方法
    values:
      - manual
      - ansible
      - terraform
  note:
    label: 補足
    free_value: true
  owner:
    label: オーナー
    required: true
    free_value: true
  risk:
    label: 注意
    free_value: true
  site:
    label: サイト
    free_value: true
  todo:
    label: TODO
    free_value: true
  visibility:
    label: 公開範囲
    values:
      - private
      - internal
      - public
  zone:
    label: ゾーン
    free_value: true
  dns-zone:
    label: DNSゾーン
    free_value: true
  network-role:
    label: ネットワーク用途
    values:
      - mgmt
      - client
      - dmz
      - transit
  os-family:
    label: OS
    values:
      - debian
      - ubuntu
      - rocky
      - windows
default_management_tags:
  - environment
  - owner
resource_type_profiles:
  dns_record:
    management_tags:
      - environment
      - owner
      - dns-zone
      - visibility
    list_columns:
      - label: 名前
        path: metadata.name
      - label: ゾーン
        path: metadata.tags.dns-zone
      - label: Record type
        path: spec.record_type
      - label: Value
        path: spec.value
      - label: 環境
        path: metadata.tags.environment
      - label: オーナー
        path: metadata.tags.owner
  vlan:
    management_tags:
      - site
      - zone
      - environment
      - owner
      - network-role
    list_columns:
      - label: 名前
        path: metadata.name
      - label: VLAN ID
        path: spec.vlan_id
      - label: CIDR
        path: spec.cidr
      - label: サイト
        path: metadata.tags.site
      - label: ゾーン
        path: metadata.tags.zone
      - label: オーナー
        path: metadata.tags.owner
  vm:
    management_tags:
      - environment
      - owner
      - site
      - os-family
      - managed-by
      - lifecycle
    list_columns:
      - label: 名前
        path: metadata.name
      - label: OS
        path: spec.os
      - label: IP
        path: spec.ip
      - label: サイト
        path: metadata.tags.site
      - label: 環境
        path: metadata.tags.environment
      - label: 管理方法
        path: metadata.tags.managed-by
  service:
    management_tags:
      - environment
      - owner
      - site
      - visibility
      - lifecycle
      - managed-by
    list_columns:
      - label: 名前
        path: metadata.name
      - label: Runtime
        path: spec.runtime
      - label: Port
        path: spec.port
      - label: 環境
        path: metadata.tags.environment
      - label: オーナー
        path: metadata.tags.owner
      - label: ライフサイクル
        path: metadata.tags.lifecycle
reserved_prefixes:
  - 'cataloga:'
