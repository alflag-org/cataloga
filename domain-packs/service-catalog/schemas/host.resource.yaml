apiVersion: cataloga.io/v2
kind: Schema
metadata:
  id: host
  name: Host
spec:
  kind: entity
  description: VM, LXC, or physical host.
  required:
    - hostKind
    - ipAddress
  required_tags:
    - environment
    - owner
    - site
    - zone
  recommended_tags:
    - lifecycle
    - criticality
  properties:
    hostKind:
      type: string
      enum: [vm, lxc, physical]
    operatingSystem:
      type: string
      enum: [Debian 12, Ubuntu 24.04, Rocky 9, Other]
    managementMethod:
      type: string
      enum: [Ansible, Manual, Other]
    ipAddress:
      type: string
    description:
      type: text
