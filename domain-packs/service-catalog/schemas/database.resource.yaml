apiVersion: cataloga.io/v2
kind: Schema
metadata:
  id: database
  name: Database
spec:
  kind: entity
  description: Database instance or logical database.
  required:
    - engine
  required_tags:
    - environment
    - owner
  recommended_tags:
    - lifecycle
    - visibility
  properties:
    engine:
      type: string
      enum: [PostgreSQL, MySQL, MariaDB, Redis, Other]
    version:
      type: string
    endpoint:
      type: string
    port:
      type: number
    description:
      type: text
