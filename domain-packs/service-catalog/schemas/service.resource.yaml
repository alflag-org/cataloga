apiVersion: cataloga.io/v2
kind: Schema
metadata:
  id: service
  name: Service
spec:
  kind: entity
  description: Application, API, daemon, or worker.
  required:
    - runtime
  required_tags:
    - environment
    - owner
  recommended_tags:
    - lifecycle
    - visibility
    - criticality
  dependency_slots:
    - key: runs_on
      relation_type: runs_on
      label: 実行先
      description: このリソースが動作するホスト、VM、LXC を選択します。
      direction: outgoing
      target_types:
        - host
      multiple: true
      required: false
    - key: uses_database
      relation_type: uses
      label: 利用先
      description: このリソースが利用するデータベースを選択します。
      direction: outgoing
      target_types:
        - database
      multiple: true
      required: false
  properties:
    runtime:
      type: string
      enum: [PHP, Python, Go, Rust, Java, JavaScript, Other]
    serviceKind:
      type: string
      enum: [web, api, worker, daemon]
    exposure:
      type: string
      enum: [internal, reverse_proxy, public]
    port:
      type: number
    healthcheck:
      type: string
    description:
      type: text
