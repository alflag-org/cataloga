apiVersion: cataloga.io/v2
kind: Schema
metadata:
  id: example.application
  name: Example Application
spec:
  kind: entity
  description: Application/service entity for demo schema-driven forms.
  required:
    - runbook
  required_tags:
    - owner
    - lifecycle
  recommended_tags:
    - environment
  dependency_slots:
    - key: depends_on
      relation_type: relation.depends_on
      label: 接続先
      description: このアプリケーションが依存する対象を選択します。
      direction: outgoing
      multiple: true
      required: false
  properties:
    isCritical:
      type: boolean
    runbook:
      type: text
    dependsOn:
      type: string
      format: entity_ref
    settings:
      type: json
