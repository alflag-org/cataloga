name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cataloga-cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Install web dependencies
        run: mise exec -- pnpm -C apps/web install --frozen-lockfile

      - name: Build
        run: mise run build

      - name: Apply D1 migrations
        working-directory: crates/cataloga-worker
        run: wrangler d1 migrations apply cataloga-prod --remote

      - name: Deploy Worker
        working-directory: crates/cataloga-worker
        run: wrangler deploy
