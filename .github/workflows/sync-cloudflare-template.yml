name: sync-cloudflare-template

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cataloga
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

      - name: Install tools
        run: mise install

      - name: Install web dependencies
        run: mise run install-web

      - name: Install worker-build
        run: cargo install worker-build

      - name: Build and prepare template
        run: mise run cloudflare-template-prepare

      - name: Validate generated template
        run: mise run cloudflare-template-check

      - name: Remove local validation artifacts
        run: |
          rm -rf dist/cloudflare-template/node_modules
          rm -f dist/cloudflare-template/package-lock.json

      - name: Push generated template repository
        env:
          TEMPLATE_REPO_TOKEN: ${{ secrets.CATALOGA_TEMPLATE_REPO_TOKEN }}
          TEMPLATE_REPO: viasnake/cataloga-cloudflare-template
        run: |
          set -euo pipefail

          if [ -z "${TEMPLATE_REPO_TOKEN}" ]; then
            echo "CATALOGA_TEMPLATE_REPO_TOKEN is required" >&2
            exit 1
          fi

          test -f dist/cloudflare-template/wrangler.toml
          test -f dist/cloudflare-template/package.json
          test -f dist/cloudflare-template/build/worker/shim.mjs
          test -f dist/cloudflare-template/build/index.js
          test -d dist/cloudflare-template/public
          test -d dist/cloudflare-template/migrations/d1

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          git clone --depth 1 "https://x-access-token:${TEMPLATE_REPO_TOKEN}@github.com/${TEMPLATE_REPO}.git" "$workdir/repo"
          cd "$workdir/repo"
          git checkout -B main

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/cloudflare-template"/. .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No template changes to sync."
            exit 0
          fi

          git commit -m "chore: sync cataloga cloudflare template ${GITHUB_REF_NAME:-manual}"
          git push --force-with-lease origin main
