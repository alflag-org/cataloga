name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install tools
        run: mise install
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: mise run fmt-rust-check
      - name: Clippy
        run: mise run lint-rust
      - name: Test
        run: mise run test-rust
      - name: Build
        run: mise run build-rust

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install tools
        run: mise install
      - name: Setup Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web dependencies
        run: mise run install-web
      - name: Format check
        run: mise run fmt-web-check
      - name: Typecheck
        run: mise run lint-web
      - name: Test
        run: mise run test-web
      - name: Build
        run: mise run build-web

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust
      - web
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install tools
        run: mise install
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Setup Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web dependencies
        run: mise run install-web
      - name: Build web assets
        run: mise run build-web
      - name: Install worker-build
        run: cargo install worker-build
      - name: Build Worker
        run: mise run build-worker

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust
      - web
      - worker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    concurrency:
      group: cataloga-cloudflare-deploy
      cancel-in-progress: false
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install tools
        run: mise install
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Setup Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web dependencies
        run: mise run install-web
      - name: Build web assets
        run: mise run build-web
      - name: Install worker-build
        run: cargo install worker-build
      - name: Build Worker
        run: mise run build-worker
      - name: Apply D1 migrations
        working-directory: crates/cataloga-worker
        run: wrangler d1 migrations apply cataloga-prod --remote
      - name: Deploy Worker
        working-directory: crates/cataloga-worker
        run: wrangler deploy
      - name: Smoke test deployed Worker
        if: ${{ vars.CATALOGA_PROD_URL != '' }}
        run: curl -fsS "${{ vars.CATALOGA_PROD_URL }}/api/health"
