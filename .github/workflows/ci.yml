name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Install tools
        run: mise install
      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format check
        run: mise run fmt-rust-check
      - name: Clippy
        run: mise run lint-rust
      - name: Test
        run: mise run test-rust
      - name: Build
        run: mise run build-rust

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Install tools
        run: mise install
      - name: Setup Node cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web dependencies
        run: mise run install-web
      - name: Format check
        run: mise run fmt-web-check
      - name: Typecheck
        run: mise run lint-web
      - name: Test
        run: mise run test-web
      - name: Build
        run: mise run build-web

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust
      - web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Install tools
        run: mise install
      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Setup Node cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web dependencies
        run: mise run install-web
      - name: Build web assets
        run: mise run build-web
      - name: Install worker-build
        run: cargo install worker-build
      - name: Build Worker
        run: mise run build-worker

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust
      - web
      - worker
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'viasnake/cataloga') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Install tools
        run: mise install
      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Setup Node cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web dependencies
        run: mise run install-web
      - name: Build web assets
        run: mise run build-web
      - name: Install worker-build
        run: cargo install worker-build
      - name: Build Worker
        run: mise run build-worker
      - name: Inject deploy identifiers
        env:
          CATALOGA_D1_DATABASE_ID: ${{ secrets.CATALOGA_D1_DATABASE_ID }}
          CATALOGA_R2_BUCKET_NAME: ${{ secrets.CATALOGA_R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${CATALOGA_D1_DATABASE_ID}" ]; then
            echo "CATALOGA_D1_DATABASE_ID is required" >&2
            exit 1
          fi
          if [ -z "${CATALOGA_R2_BUCKET_NAME}" ]; then
            echo "CATALOGA_R2_BUCKET_NAME is required" >&2
            exit 1
          fi

          perl -0pi -e 's/database_id = ".*?"/database_id = "'$CATALOGA_D1_DATABASE_ID'"/' crates/cataloga-worker/wrangler.toml
          perl -0pi -e 's/bucket_name = ".*?"/bucket_name = "'$CATALOGA_R2_BUCKET_NAME'"/' crates/cataloga-worker/wrangler.toml
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: mise run worker-deploy
