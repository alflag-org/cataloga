services:
  cataloga:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8080:8080"
    environment:
      CATALOGA_REGISTRY_PATH: /app/registry
      CATALOGA_RUNTIME_PATH: /app/.cataloga
    volumes:
      - ./registry:/app/registry
      - ./.cataloga:/app/.cataloga
    restart: unless-stopped
