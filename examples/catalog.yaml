# yaml-language-server: $schema=../schemas/cataloga.v1.schema.json
version: 1

resource_types:
  - id: device
    title: Device
    group: infra
    description: Network device inventory
    fields:
      - name: role
        label: Role
        type: enum
        enum_values:
          - router
          - switch
      - name: mgmt_ip
        label: Management IP
        type: ip
    required_fields:
      - role
      - mgmt_ip
    list_columns:
      - name
      - spec.role
      - spec.mgmt_ip
    form_layout:
      - title: Basic
        fields:
          - role
          - mgmt_ip
    detail_sections:
      - title: Basic
        fields:
          - role
          - mgmt_ip
    validation_rules:
      - type: ip
        field: mgmt_ip

resources:
  - id: device-edge01
    type: device
    name: edge01
    tags:
      site: kanagawa01
    spec:
      role: router
      mgmt_ip: 10.10.10.1
