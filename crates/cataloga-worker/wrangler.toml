name = "cataloga-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2026-05-06"

[assets]
directory = "../../apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "CATALOGA_DB"
database_name = "cataloga-prod"
database_id = "e7406e48-4b16-4cbd-9acb-5989b0b4095e"
migrations_dir = "../../migrations/d1"

[[r2_buckets]]
bucket_name = "cataloga-prod-snapshots"
binding = "CATALOGA_SNAPSHOTS"
